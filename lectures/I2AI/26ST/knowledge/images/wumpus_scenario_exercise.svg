<svg width="680" height="560" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Wumpus World initial scenario</title>
  <desc>4x4 grid showing agent in [1,1] with nothing perceived, breeze in [2,1], stench in [1,2], all other cells unknown</desc>

  <rect width="680" height="560" fill="white"/>

  <!-- Row 4 -->
  <rect x="80"  y="40"  width="130" height="110" fill="none" stroke="#888" stroke-width="1"/>
  <rect x="210" y="40"  width="130" height="110" fill="none" stroke="#888" stroke-width="1"/>
  <rect x="340" y="40"  width="130" height="110" fill="none" stroke="#888" stroke-width="1"/>
  <rect x="470" y="40"  width="130" height="110" fill="none" stroke="#888" stroke-width="1"/>

  <!-- Row 3 -->
  <rect x="80"  y="150" width="130" height="110" fill="none" stroke="#888" stroke-width="1"/>
  <rect x="210" y="150" width="130" height="110" fill="none" stroke="#888" stroke-width="1"/>
  <rect x="340" y="150" width="130" height="110" fill="none" stroke="#888" stroke-width="1"/>
  <rect x="470" y="150" width="130" height="110" fill="none" stroke="#888" stroke-width="1"/>

  <!-- Row 2 -->
  <rect x="80"  y="260" width="130" height="110" fill="#f0f0f0" stroke="#888" stroke-width="1"/>
  <rect x="210" y="260" width="130" height="110" fill="none" stroke="#888" stroke-width="1"/>
  <rect x="340" y="260" width="130" height="110" fill="none" stroke="#888" stroke-width="1"/>
  <rect x="470" y="260" width="130" height="110" fill="none" stroke="#888" stroke-width="1"/>

  <!-- Row 1 -->
  <rect x="80"  y="370" width="130" height="110" fill="#f0f0f0" stroke="#888" stroke-width="1"/>
  <rect x="210" y="370" width="130" height="110" fill="#f0f0f0" stroke="#888" stroke-width="1"/>
  <rect x="340" y="370" width="130" height="110" fill="none" stroke="#888" stroke-width="1"/>
  <rect x="470" y="370" width="130" height="110" fill="none" stroke="#888" stroke-width="1"/>

  <!-- [1,2] Stench — wavy smoke lines -->
  <path d="M110 272 Q118 265 126 272 Q134 279 142 272 Q150 265 158 272" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M110 283 Q118 276 126 283 Q134 290 142 283 Q150 276 158 283" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M110 294 Q118 287 126 294 Q134 301 142 294 Q150 287 158 294" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <text x="145" y="348" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" fill="#222">Stench</text>

  <!-- [2,1] Breeze — wavy lines -->
  <text x="275" y="392" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="11" fill="#666" font-style="italic">Breeze</text>
  <path d="M225 410 Q241 402 257 410 Q273 418 289 410 Q305 402 321 410" fill="none" stroke="#7799BB" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M225 425 Q241 417 257 425 Q273 433 289 425 Q305 417 321 425" fill="none" stroke="#7799BB" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M225 440 Q241 432 257 440 Q273 448 289 440 Q305 432 321 440" fill="none" stroke="#7799BB" stroke-width="1.5" stroke-linecap="round"/>

  <!-- [1,1] Agent stick figure -->
  <circle cx="145" cy="398" r="12" fill="none" stroke="#444" stroke-width="1.8"/>
  <line x1="145" y1="410" x2="145" y2="442" stroke="#444" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="145" y1="422" x2="126" y2="432" stroke="#444" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="145" y1="422" x2="162" y2="430" stroke="#444" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M166 418 Q174 430 166 442" fill="none" stroke="#444" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="166" y1="418" x2="166" y2="442" stroke="#444" stroke-width="1" stroke-linecap="round"/>
  <line x1="145" y1="430" x2="166" y2="430" stroke="#444" stroke-width="1" stroke-linecap="round"/>
  <line x1="145" y1="442" x2="133" y2="466" stroke="#444" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="145" y1="442" x2="157" y2="466" stroke="#444" stroke-width="1.8" stroke-linecap="round"/>
  <text x="145" y="480" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="13" fill="#222">Agent</text>

  <!-- Row labels -->
  <text x="60" y="95"  text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="16" fill="#222">4</text>
  <text x="60" y="205" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="16" fill="#222">3</text>
  <text x="60" y="315" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="16" fill="#222">2</text>
  <text x="60" y="425" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="16" fill="#222">1</text>

  <!-- Column labels -->
  <text x="145" y="508" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="16" fill="#222">1</text>
  <text x="275" y="508" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="16" fill="#222">2</text>
  <text x="405" y="508" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="16" fill="#222">3</text>
  <text x="535" y="508" text-anchor="middle" dominant-baseline="central" font-family="Arial, sans-serif" font-size="16" fill="#222">4</text>
</svg>
