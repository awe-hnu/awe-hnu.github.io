<?xml version="1.0" encoding="UTF-8"?>
<svg id="graphics" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 988 525">
  <defs>
    <style>
      .box   { fill: #fff; stroke: #1d1d1b; stroke-width: 1px; }
      .conn  { stroke: #1d1d1b; stroke-width: 1px; }
      .arrow { fill: none; stroke: #0333ff; stroke-width: 2px; }
      .head  { fill: #0333ff; }
      .label { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 14px; fill: #1d1d1b; }
      .body  { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 11.5px; fill: #1d1d1b; }
    </style>
  </defs>

  <!-- connectors -->
  <line class="conn" x1="296.5" y1="262.5" x2="369" y2="262.5"/>
  <line class="conn" x1="619" y1="262.5" x2="691.5" y2="262.5"/>
  <line class="conn" x1="496.87" y1="124.92" x2="496.87" y2="212.46"/>
  <line class="conn" x1="496.87" y1="312.46" x2="496.87" y2="399.99"/>

  <!-- flow arrows: focal point -> challenge -> opportunity -> approach -> payoff -->
  <g>
    <line class="arrow" x1="518.77" y1="212.46" x2="518.77" y2="151.04"/>
    <polygon class="head" points="526.25 153.23 518.77 140.28 511.29 153.23"/>
  </g>
  <g>
    <path class="arrow" d="M619.75,74.92c77.81,21.08,138.73,59.98,167.57,107.78"/>
    <polygon class="head" points="777.07 184.98 794.1 195.36 794.57 175.42"/>
  </g>
  <g>
    <path class="arrow" d="M641.04,429.96c79.48-23.61,139.87-66.14,163.99-117.49"/>
    <polygon class="head" points="645.21 436.46 630.69 432.9 641.04 422.1"/>
  </g>
  <g>
    <path class="arrow" d="M369,449.99c-77.81-21.08-138.73-59.98-167.57-107.78"/>
    <polygon class="head" points="211.68 339.93 194.65 329.56 194.18 349.49"/>
  </g>

  <!-- Challenge (top) -->
  <rect class="box" x="369" y="24.92" width="250" height="100"/>
  <text class="label" x="494" y="50" text-anchor="middle">Challenge</text>
  <text class="body" x="494" y="71" text-anchor="middle">Competitors ship faster while</text>
  <text class="body" x="494" y="87" text-anchor="middle">our cost and cycle times stay flat;</text>
  <text class="body" x="494" y="103" text-anchor="middle">a growing competitive liability</text>

  <!-- Focal point (centre) -->
  <rect class="box" x="369" y="212.46" width="250" height="100"/>
  <text class="label" x="494" y="242" text-anchor="middle">Focal point</text>
  <text class="body" x="494" y="265" text-anchor="middle">Make AI-assisted development</text>
  <text class="body" x="494" y="281" text-anchor="middle">a core engineering capability</text>

  <!-- Opportunity (right) -->
  <rect class="box" x="691.5" y="212.46" width="250" height="100"/>
  <text class="label" x="816.5" y="242" text-anchor="middle">Opportunity</text>
  <text class="body" x="816.5" y="265" text-anchor="middle">A step-change in engineering</text>
  <text class="body" x="816.5" y="281" text-anchor="middle">velocity and cost per feature</text>

  <!-- Approach (bottom) -->
  <rect class="box" x="369" y="399.99" width="250" height="100"/>
  <text class="label" x="494" y="426" text-anchor="middle">Approach</text>
  <text class="body" x="494" y="447" text-anchor="middle">Staged, governed rollout: pilot,</text>
  <text class="body" x="494" y="463" text-anchor="middle">prove against baselines, then</text>
  <text class="body" x="494" y="479" text-anchor="middle">scale with quality + IP guardrails</text>

  <!-- Payoff (left) -->
  <rect class="box" x="46.5" y="212.46" width="250" height="100"/>
  <text class="label" x="171.5" y="237" text-anchor="middle">Payoff</text>
  <text class="body" x="171.5" y="258" text-anchor="middle">Faster time to market, lower</text>
  <text class="body" x="171.5" y="274" text-anchor="middle">cost per feature, and a market</text>
  <text class="body" x="171.5" y="290" text-anchor="middle">position rivals cannot copy</text>
</svg>
